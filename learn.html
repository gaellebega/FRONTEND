<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="./learn.js" defer></script>
  <script src="./events.js" defer></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div id="container1"></div>
<div id="box"></div>
<div id="container">
  <p id="id">Hello World</p>
</div>
<!-- <img id="my-image" src="./src/images/girl.png" class="h-10 w-50"/> -->

<!-- changing the css -->
 <div id="my-new"></div>
 <button type="button" 
 onclick="document.getElementById('id').style.color='blue'">
click me</button>


<div>
  <p>today we have</p>
  <p id="more" style="display:none">We have alot to talk about in the house so everyone be there on time</p>
  <button id ="again"onclick="document.getElementById('more').style.display='block'">read moree...</button>


</div>
<div id="big-div" class="bg-amber-700 h-48 w-96 p-4">
  <p class="unique">here I am the biggest div</p>

  <button onclick="
    let div = document.getElementById('big-div');

    div.classList.remove('bg-amber-700');
    div.classList.add('bg-amber-200');

    document.querySelector('.unique').textContent = 'Am Unique';
  ">
    change
  </button>
</div>

<div>
    <p>this is the form</p>

    <input 
    id="number" 
    type="number" 
    class="bg-gray-200 border border-black no-spinner"/>

    <p id="error"></p>

    <button 
    type="button"
    class="bg-blue-500 p-2 rounded-md m-9" 
    onclick="validateMe()">send</button>
</div>
<details class="bg-green-600 h-30 w-40">
  <summary>Click to read more</summary>
  <p>This text can be opened and closed without JavaScript.</p>
</details>
<!-- CLICK EVENT EXAMPLE -->
<div>
  <button id="btn" class="bg-stone-500 text-gray-800">click me</button>
  <p id="result" class="text-green-600 text-sm "></p>
</div>
<!-- KEYBOARD EVENT -->
<div>
  <input id="inputBox" placeholder="name"/>
  <p id="output"></p>
</div>
<!-- keyup -->
 <input id="mymessage" placeholder="type here"/>
 <p id="result"></p>
<!-- form validation with the alert -->
 <form method="post" class=" bg-rose-400 h-90 w-90" >
  <label for="email" class="text-white">Email:</label><br>
  <input type="email" id="email" name="email" class="bg-white" border /><br>
  <button type="submit"  class>Submit</button>
 </form>
<!-- WINDOW SCROL EVENT  -->
 <div class="bg-blue-300 h-200vh " style="height:200vh; width:100vh">
  <h3 id="texts">heyyy</h3>
 </div>
 <div class="bg-orange-700" id="big">
<h2>Hellooooo</h2>
 </div>
 <div class="h-64 w-64 bg-pink-500 rounded-full ">
  <div class="flex" class="bg-red-800">
    <p id="hours" class="bg-blue-700">00:</p>
    <p id="minutes" class="bg-emerald-900">00:</p>
    <p id="seconds" class="bg-orange-600">00</p>
  </div>
 </div>
</body>
</html>
