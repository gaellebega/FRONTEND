<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./script.js" defer></script>
  <title>⏳Bega's⌛</title>
</head>
<body class=" bg-black">
<div class="flex justify-center items-center min-h-screen">
  <div class="text-center">
  <h2 class="text-pink-800 font-bold text-7xl mb-12">MY TIMER</h2>
  <div class="flex gap-4 ">
    <p id="hours" class="font-bold text-9xl bg-pink-400 p-2 rounded-xl scale-y-125" style="font-family: 'JetBrains Mono', monospace;">00</p>
    <p id="minutes" class="font-bold text-9xl bg-pink-400 p-2 rounded-xl scale-y-125" style="font-family: 'JetBrains Mono', monospace;">00</p>
    <p id="seconds" class="font-bold text-9xl bg-pink-400 p-2 rounded-xl scale-y-125" style="font-family: 'JetBrains Mono', monospace;">00</p>
  </div>
</div>

</div>
<div class="flex gap-3   w-full max-w-sm font-bold text-2xl mx-auto  mb-12">
<button id="start" class="text-amber-50 bg-pink-800 p-3 rounded-lg">START</button>
<button id="stop" class="text-amber-50 bg-pink-800 p-3 rounded-lg">STOP</button>
<button id="resume" class="text-amber-50 bg-pink-800 p-3 rounded-lg">RESUME</button>
<button id="reset" class="text-amber-50 bg-pink-800 p-3 rounded-lg">RESET</button>
</div>
</body>
</html>
